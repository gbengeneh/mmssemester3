apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: semester4app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
      - name: api-gateway
        image: yourregistry/api-gateway:latest  # Update with your image
        ports:
        - containerPort: 8084
        volumeMounts:
        - name: config-volume
          mountPath: /app/config
        command: ["java"]
        args: ["-jar", "app.jar", "--spring.config.import=optional:file:/app/config/application.yml[/]"]
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /actuator/health/liveness
            port: 8084
          initialDelaySeconds: 60
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /actuator/health/readiness
            port: 8084
          initialDelaySeconds: 30
          periodSeconds: 10
      volumes:
      - name: config-volume
        configMap:
          name: api-gateway-config
---


