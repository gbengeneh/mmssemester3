apiVersion: v1
kind: ConfigMap
metadata:
  name: employee-service-config
  namespace: semester4app
data:
  application.yml: |
    server:
      port: 8082
    
    spring:
      application:
        name: employeeService
      datasource:
        url: jdbc:h2:mem:employee_db
        driver-class-name: org.h2.Driver
        username: sa
        password: ""
      jpa:
        hibernate:
          ddl-auto: update
        show-sql: true
      h2:
        console:
          enabled: true
    
    management:
      endpoints:
        web:
          exposure:
            include: health,info,liveness,readiness
---

