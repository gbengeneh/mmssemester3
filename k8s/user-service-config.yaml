apiVersion: v1
kind: ConfigMap
metadata:
  name: user-service-config
  namespace: semester4app
data:
  application.yml: |
    server:
      port: 8081
    
    spring:
      application:
        name: user_service
      datasource:
        url: jdbc:postgresql://postgres:5432/user_service
        username: postgres
        password: ${SPRING_DATASOURCE_PASSWORD:123}
        driver-class-name: org.postgresql.Driver
      jpa:
        hibernate:
          ddl-auto: update
        show-sql: true
        properties:
          hibernate:
            dialect: org.hibernate.dialect.PostgreSQLDialect
      h2:
        console:
          enabled: false
    
    app:
      jwt:
        secret: ReplaceWithAStrongSecretAtLeast32CharsLong!
        accessExpirationMs: 900000
        refreshExpirationMs: 604800000
    
    management:
      endpoints:
        web:
          exposure:
            include: health,info,liveness,readiness
---

